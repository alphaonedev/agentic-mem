      # AgenticMem — commercial product framing
      
      **Operator directive 2026-04-22:** *"'the-standard' will be the secret sauce we will use for AgenticMem the commercially supported 'ai-memory'."*
      
      ## What this means
      
      - **AgenticMem** = commercial offering built on top of `ai-memory-mcp` open source.
      - **`the-standard` namespace** = the commercial differentiator — a portable, importable, versioned AI NHI governance + engineering Bible.
      - Any AI NHI working on an AgenticMem customer project must import `the-standard` at session start and adhere to it. This is the value-add that makes AgenticMem > plain ai-memory.
      
      ## Implications for engineering
      
      1. **Exportability is a product feature**, not a nice-to-have.
         - `docs/THE_STANDARD.md` (Markdown, human-readable)
         - `docs/the-standard.yaml` (machine-parseable)
         - `docs/the-standard.json` (structured)
         - ai-memory CLI: `ai-memory standard export` / `ai-memory standard import`
      2. **Versioning is a brand promise.** Semver for `the-standard`. Every customer knows which version they're running.
      3. **Attribution stays intact on export.** Exports carry `product: AgenticMem` + `standard_version: X.Y.Z` + `origin: alphaonedev/ai-memory-mcp`.
      4. **Inheritance remains first-class.** Customer-specific overlays extend `the-standard` via `parent=the-standard`, just like internal namespaces do. Overlay standards never override §1–N of the Bible.
      5. **Private repo → public deliverable.** The standard itself is published (so AI NHIs can import it); customer-specific overlays stay private.
      
      ## What NOT to do
      
      - Don't fork `the-standard` silently. Any proposed change goes through a versioned release on the main branch.
      - Don't let `the-standard` drift between ai-memory (memory form) and `docs/THE_STANDARD.md` (file form). Single source of truth — one generates the other.
      - Don't conflate "AgenticMem brand requirements" with `the-standard` itself. The standard is engineering-domain; branding is marketing-domain.
      
      ## Where to publish THE_STANDARD.md
      
      - Primary: `alphaonedev/ai-memory-mcp` → `docs/THE_STANDARD.md`. The memory platform publishes the standard for the memory platform's AI NHI consumers. Natural home.
      - Secondary: symlinked or vendored into every AlphaOne repo's `docs/THE_STANDARD.md` (ai-memory-ai2ai-gate, any future projects).
      
      ## Next actions (tracked in EPIC #14 + future AgenticMem epic)
      
      1. Author THE_STANDARD.md in ai-memory-mcp docs/.
      2. Add `ai-memory standard {export,import}` CLI subcommands.
      3. Bump the-standard version to v1.1.0 (done).
      4. File an AgenticMem-product epic on alphaonedev/ai-memory-mcp for tracking these deliverables.
